[build]
builder = "NIXPACKS"
buildCommand = "cd apps/backend && npm install && npm run db:generate && npm run build"

[deploy]
startCommand = "cd apps/backend && npm run db:push && npm start"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
